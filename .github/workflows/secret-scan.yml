name: Secret Scanning with Betterleaks

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  secret-scan:
    name: Detect Exposed Credentials
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full repository history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Betterleaks
        run: |
          curl -sSL https://github.com/AikidoSec/betterleaks/releases/latest/download/betterleaks_linux_amd64.tar.gz | tar xz
          chmod +x betterleaks
          sudo mv betterleaks /usr/local/bin/
          betterleaks --version

      - name: Run credential scan
        run: |
          betterleaks git \
            --report-format sarif \
            --report-path betterleaks.sarif \
            --exit-code 1 \
            .

      - name: Upload findings to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: betterleaks.sarif